services:
  docs:
    image: squidfunk/mkdocs-material:latest
    container_name: mkdocs_local
    ports:
      - "8000:8000"
    volumes:
      - .:/docs
    # This command tells MkDocs to watch for changes and serve on all interfaces
    command: serve --dev-addr 0.0.0.0:8000
    # Optional: ensure it restarts if your computer reboots
    restart: unless-stopped